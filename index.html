<!--
Pour mettre à jour ton dépôt GitHub avec les modifications de ton site, utilise ces commandes dans le terminal :
1. Ajouter tous les fichiers modifiés :
   git add .
2. Commiter les modifications avec un message décrivant les changements :
   git commit -m "Description des modifications"
3. Pousser les modifications vers GitHub :
   git pushgit remote add origin https://github.com/Jeanardeche/Boutique-3D.git

   site: https://jeanardeche.github.io/Boutique-3D/
-->

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="overlay"></div>
    </header>

    <section class="intro">
        <h1>Votre Atelier de Créations 3D</h1>
        <p>Donnez vie à vos idées avec nos objets uniques et personnalisables.</p>
        
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Rechercher une création (ex: vase, robot...)" autocomplete="off">
        </div>
    </section>
    
    <section id="resultats" class="livres-list">
        <!-- Les produits seront insérés ici par JavaScript -->
    </section>

    <script src="script.js"></script>

    <footer>
        <p>&copy; 2026 Boutique 3D - Créations originales</p>
        <p>Contactez-nous pour toute demande personnalisée !</p>
    </footer>
</body>
</html>
